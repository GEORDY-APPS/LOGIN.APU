<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Registro de Salidas APU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DISEÑO MINIMALISTA Y COMPACTO */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #F1F5F9; /* Gris fondo oficial */
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #FFFFFF;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px; /* Más estrecho y minimalista */
            text-align: center;
        }

        .login-card img {
            width: 110px; /* Logo un poco más pequeño */
            height: auto;
            margin-bottom: 1rem;
        }

        .login-card h2 {
            color: #000000;
            margin-bottom: 1.8rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: #1F1F1F;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* BORDES CONTINUOS Y FINOS */
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #AEB6C3; /* Gris medio continuo */
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background: #FFFFFF;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1E293B; /* Azul principal al enfocar */
        }

        .input-group input::placeholder {
            color: #B2B4B6;
        }

        /* BOTÓN COMPACTO */
        .btn-login {
            width: 100%; /* Botón al ancho total para que se vea ordenado */
            padding: 12px;
            background-color: #1E293B;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        .btn-login:hover {
            background-color: #000000;
        }

        #error-msg {
            color: #FF0000;
            background: #FCE8E6;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="APU-SOL.png" alt="Logo APU">
        <h2>Iniciar Sesión</h2>
        
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="Ingrese su usuario">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Ingrese su contraseña">
        </div>

        <button id="btnLogin" class="btn-login">INGRESAR</button>

        <div id="error-msg">
            <i class="fas fa-exclamation-circle"></i> Credenciales incorrectas
        </div>
    </div>

    <script>
        document.getElementById('btnLogin').addEventListener('click', login);

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'index.html';
            } 
            else if (user === 'user' && pass === 'user123') {
                localStorage.setItem('userRole', 'standard');
                window.location.href = 'index.html';
            } 
            else {
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('error-msg').style.display = 'none';
            });
        });
    </script>

</body>
</html>
